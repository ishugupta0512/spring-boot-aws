name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main  # triggers when you push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '21'

      # Step 3: Build Spring Boot app
      - name: Build Spring Boot App
        run: ./mvnw clean package -DskipTests

      # Step 4: Ensure folder exists on EC2
      - name: Ensure EC2 folder exists
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: mkdir -p /home/ec2-user/springboot-app

      # Step 5: Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: target/demo-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/springboot-app/target/
          debug: true  # optional, helps debug SCP issues

      # Step 6: Restart Spring Boot App on EC2
      - name: Restart Spring Boot App
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            pkill -f 'java -jar demo-0.0.1-SNAPSHOT.jar' || true
            nohup java -jar /home/ec2-user/springboot-app/target/demo-0.0.1-SNAPSHOT.jar > /home/ec2-user/springboot-app/nohup.log 2>&1 &