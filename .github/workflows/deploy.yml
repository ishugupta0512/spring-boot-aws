name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main   # runs when you push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: '21'

    - name: Build Spring Boot App
      run: ./mvnw clean package -DskipTests

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        port: 22
        source: target/myapp.jar   # replace with your JAR name
        target: /home/ec2-user/springboot-app/

    - name: Restart Spring Boot App
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          pkill -f 'java -jar myapp.jar' || true
          nohup java -jar /home/ec2-user/springboot-app/myapp.jar > /dev/null 2>&1 &